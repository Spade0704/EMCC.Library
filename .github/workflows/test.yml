name: tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Codex test suite (stdlib-only; unittest discover per CODEX_BUILD_SPEC §7 Phase 3)
        run: python -m unittest discover -s tests -t .
