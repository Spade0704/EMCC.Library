name: tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Exercise the full supported range: pyproject declares requires-python >=3.10, so CI
    # must run the 3.10 floor through current 3.13 — not a single version (finding LIB-09,
    # mirrors EMCC.DFDU/test.yml). fail-fast:false so every version reports independently.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: compileall (stdlib static check — every module byte-compiles)
        run: python -m compileall -q scripts tests "Biz.Automation/wikisys.library/_scripts"
      - name: Run Codex test suite (stdlib-only; unittest discover per CODEX_BUILD_SPEC §7 Phase 3)
        run: python -m unittest discover -s tests -t .
