# Examples (commented out — fixture ships empty so positive-scan tests
# can extend in-test via TempDir+copytree without mutating the fixture):
#
#   - pattern: "secret-codename"
#     severity: error
#     message: "Internal codename leaked to a public page"
#     rule: codename
#   - pattern: "internal-only-feature"
#     severity: warning
#     message: "Feature flagged as internal-only"
#   - pattern: "approved-public-term"
#     severity: info
#     message: "Approved-public term, no flag emitted"
#     rule: approved

rules: []
