# _canon/topics.yaml — Codex topic registry for cross-link generation.
# Consumed by:
#   _scripts/build_topic_index.py     (P18.2 — word-boundary keyword + alias match)
#   _scripts/cross_link_topics.py     (P18.3 — see-also block writer)
#   _scripts/validate_topic_registry.py (P18.4 — page-topic-resolve + orphan check)
#
# Schema (per spec v1.3 §2.5):
#   - wrapper key: `topics` (list)
#   - per-entry required: name, keywords
#   - per-entry optional: aliases, cross_manual, min_similarity
#
# Note: keywords and aliases use flow-list form (`[a, b, c]`) because the
# parse_config_yaml YAML-subset parser only accepts `- key: value` for block
# list items (see _scripts/_lib/frontmatter.py).

topics:
  - name: codex_architecture
    keywords: ["folder roles", "wiki structure", "three folder roles"]

  - name: codex_operations
    keywords: ["bootstrap", "sync", "ingest"]

  - name: cross_link_generation
    aliases: [see_also_block]
    keywords: ["see also", "marker", "TF-IDF", "related_files", "cross-link"]

  - name: canon_discipline
    keywords: ["canon", "ground truth", "_canon"]

  - name: frontmatter_schema
    keywords: ["frontmatter", "YAML header"]

  - name: ingest_procedure
    keywords: ["ingest", "_inbox", "_sources/raw", "pending_triage"]

  - name: iron_soul_reference
    aliases: [scoria_prime]
    keywords: ["Iron Soul", "Scoria Prime"]

  - name: librarian_persona
    keywords: ["Librarian", "persona drop-in"]

  - name: framework_durability
    keywords: ["load-bearing", "framework", "framework page"]

  - name: status_bands
    keywords: ["gap", "outlined", "solid", "ready"]
