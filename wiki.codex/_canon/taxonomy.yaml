# _canon/taxonomy.yaml — Codex subject classifications.
# Consumed by:
#   _scripts/check_canon_consistency.py (lookup_key = name; optional value_field = parent_name)
#   _scripts/build_canon_drift_report.py (snapshot + diff over time)
#
# Schema (per spec v1.3 §2.5):
#   - wrapper key: `categories` (list)
#   - per-entry required: name (str)
#   - per-entry optional: parent_name (str; hierarchical link)
#
# Subject-matter categories only. Codex's page-type / status-band / visibility enums
# are NOT taxonomy entries — they are documented as content on
# 01-Architecture/Frontmatter-Schema.md (meta-schema, not Library taxonomy).

categories:
  - name: "Codex Operation"
  - name: "Bootstrap"
    parent_name: "Codex Operation"
  - name: "Sync"
    parent_name: "Codex Operation"
  - name: "Ingest"
    parent_name: "Codex Operation"
  - name: "Maintenance"
    parent_name: "Codex Operation"
